<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purchase History - Pixel Shot</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f7fb;
            color: #1f2937;
        }

        header {
            background: #1f2937;
            color: #fff;
            padding: 20px;
            text-align: center;
        }

        .container {
            max-width: 950px;
            margin: 24px auto;
            padding: 0 16px 24px;
        }

        .top-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            gap: 10px;
        }

        .btn {
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 10px 14px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        .btn.secondary {
            background: #4b5563;
        }

        .purchase-card {
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
            margin-bottom: 16px;
            padding: 16px;
        }

        .purchase-header {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
            border-bottom: 1px solid #e5e7eb;
            padding-bottom: 10px;
        }

        .items-table {
            width: 100%;
            border-collapse: collapse;
        }

        .items-table th,
        .items-table td {
            text-align: left;
            padding: 8px;
            border-bottom: 1px solid #e5e7eb;
        }

        .empty-state {
            background: #fff;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
        }

        .toast {
            position: fixed;
            right: 20px;
            bottom: 20px;
            background: #fff;
            border-left: 5px solid #1f2937;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
            border-radius: 8px;
            padding: 14px 16px;
            max-width: 430px;
            opacity: 0;
            transform: translateY(16px);
            transition: opacity 0.25s ease, transform 0.25s ease;
            z-index: 1000;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        .toast.error {
            border-left-color: #c0392b;
        }

        .toast.success {
            border-left-color: #1e8449;
        }
    </style>
</head>

<body>
    <header>
        <h1>Purchase History</h1>
        <p>View your camera purchase records saved in the database.</p>
    </header>

    <div class="container">
        <div class="top-actions">
            <a class="btn secondary" href="sales.html">Back to Shop</a>
            <button class="btn" id="refresh-history" type="button">Refresh History</button>
        </div>

        <div id="history-content"></div>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="purchase-history.js"></script>
</body>

</html>
